#cloud-config
# Default Template: Standard production baseline including user management, system updates, and basic environment settings.

# 1. Automatically apply the latest security patches and package updates
package_update: true
package_upgrade: true

# 2. Basic system environment settings
timezone: UTC
locale: en_US.UTF-8

# 3. Secure access and user management
ssh_pwauth: false

users:
  - default  # Retain the cloud image's default user (e.g., ubuntu, ec2-user)
  - name: sysadmin
    gecos: System Administrator
    groups: sudo
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true  # Lock the password to force SSH key authentication
    ssh_authorized_keys:
      - ssh-rsa <YOUR-SSH-PUBLIC-KEY-HERE>